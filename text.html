<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background: #333;
        }

        /* Menu Lateral */
        .test {
            margin-left: -233px ; /* Escondido por padrão */
            border-right: 2px solid red;
            height: 100vh;
            width: 233px;
            background: gray;
            position: fixed;
            transition: all 0.6s;
        }

        /* Classe que será adicionada pelo JS */
        .test.active {
            margin-left: 0;
        }

        .open {
            color: white;
            margin: 10px;
            z-index: 1000;
            font-size: 21px;
            cursor: pointer; /* Muda o cursor para indicar clique */
            display: inline-block;
        }

        .open a {
            text-decoration: none;
            color: white;
        }

        .test li {
            margin: 15px;
            font-size: 17px;
            list-style: none;
        }

        .test a {
            text-decoration: none;
            color: blue;
        }
        .test li:hover{
            background: #fff;;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .test i{
            color: #333;
            font-size: 19px;
        }
    </style>
</head>
<body>

    <div class="open" id="open">
        <!-- Removi o href vazio para o link não recarregar a página -->
        <a href="javascript:void(0)"><i><i class="bi bi-list"></i></i></a>
    </div>

    <nav class="test" id="menu">
        <li><span><a href="" onclick="entrar()"><i class="bi bi-box-arrow-in-right"></i></a> Entra</span></li>
        <li><span><a href="#"><i class="bi bi-house"></i></a> Casa</span></li>
        <li><span><a href="#"><i class="bi bi-person"></i></a> Perfil</span></li>
    </nav>

    <script>
        const btnOpen = document.getElementById("open");
        const menu = document.getElementById("menu");

        btnOpen.onclick = () => {
            menu.classList.toggle('active');
            
            // Opcional: mudar o texto do botão
            const link = btnOpen.querySelector('i');
            link.innerHTML = menu.classList.contains('active') ? '<i class="bi bi-x-lg"></i>'  : '<i class="bi bi-list"></i>';
        };
        //entrar
        function entrar(){
            prompt('Qual é o seu nome ?');
            prompt('Qual é a sua idade ?');
            //alertar
            alert('Você entrou !');
        }
    </script>
</body>
</html>
